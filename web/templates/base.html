<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Deep Research{% endblock %}</title>
  <style>
    :root { --bg:#f6f8fa; --panel:#ffffff; --border:#d8dee4; --fg:#1f2328; --muted:#656d76; --accent:#0969da; }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }  /* иначе .btn{display:inline-block} перебивает атрибут hidden */
    body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.55 -apple-system,Segoe UI,Roboto,sans-serif; }
    a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
    header { padding:14px 22px; border-bottom:1px solid var(--border); background:var(--panel); }
    header .crumb { color:var(--muted); }
    main { max-width:none; margin:0; padding:22px 28px; }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px 18px; margin-bottom:18px; box-shadow:0 1px 2px rgba(27,31,36,.04); }
    h1 { font-size:20px; margin:0; } h2 { font-size:16px; margin:0 0 10px; color:var(--fg); }
    table { width:100%; border-collapse:collapse; } th,td { text-align:left; padding:7px 9px; border-bottom:1px solid var(--border); vertical-align:top; }
    th { color:var(--muted); font-weight:600; font-size:13px; }
    .badge { display:inline-block; padding:1px 9px; border-radius:999px; font-size:12px; border:1px solid var(--border); }
    .s-running{ color:#1a7f37; border-color:#1a7f3766; background:#1a7f370f; } .s-done{ color:#0969da; border-color:#0969da66; background:#0969da0f; }
    .s-paused{ color:#9a6700; border-color:#9a670066; background:#9a67000f; } .s-idle{ color:var(--muted); }
    .s-intake{ color:#8250df; border-color:#8250df66; background:#8250df0f; }
    input[type=text], textarea, select { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:7px; background:#fff; color:var(--fg); font:inherit; }
    textarea { resize:vertical; } label.fld { display:block; margin:12px 0 4px; color:var(--muted); font-size:13px; }
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn:disabled, .btn[disabled] { opacity:.45; cursor:not-allowed; pointer-events:none; }
    .note { font-size:13px; padding:6px 0; } .ok{ color:#1a7f37; } .err{ color:#cf222e; }
    .muted { color:var(--muted); } .mono { font-family:ui-monospace,Consolas,monospace; font-size:13px; }
    .md :is(h1,h2,h3){ border-bottom:1px solid var(--border); padding-bottom:4px; }
    .md pre{ background:#f0f2f5; padding:12px; border-radius:8px; overflow:auto; } .md code{ font-family:ui-monospace,Consolas,monospace; }
    .pill { font-size:12px; padding:1px 7px; border:1px solid var(--border); border-radius:6px; color:var(--muted); }
    .btn { display:inline-block; padding:4px 12px; border:1px solid var(--border); border-radius:7px; color:var(--fg); background:#f3f4f6; margin-right:6px; }
    .btn:hover { background:#e9ebef; text-decoration:none; }
    ul.tl { list-style:none; padding:0; margin:0; } ul.tl li { padding:3px 0; border-bottom:1px dotted var(--border); }
  </style>
</head>
<body>
  <header>
    <span class="crumb"><a href="/">deep_research</a> {% block crumb %}{% endblock %}</span>
  </header>
  <main>{% block body %}{% endblock %}</main>
</body>
</html>
