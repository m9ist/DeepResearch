# SearXNG — поисковый бэкенд для web_search (см. ../extension/index.ts).
# Поднять:  docker compose -f deep_research/searxng/docker-compose.yml up -d
# Проверить: curl "http://localhost:8888/search?q=test&format=json"
services:
  searxng:
    image: searxng/searxng:latest
    container_name: dr-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    restart: unless-stopped
